version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: edu-sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edusync}
      POSTGRES_USER: ${POSTGRES_USER:-edusync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edusync123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data