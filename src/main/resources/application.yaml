server:
  servlet:
    context-path: /edu-sync

spring:
  application:
    name: EduSync

aws:
  s3:
    enabled: ${AWS_S3_ENABLED:false}
    bucket: ${AWS_S3_BUCKET:edusync-uploads}
    region: ${AWS_REGION:af-south-1}
  messaging:
    enabled: ${AWS_MESSAGING_ENABLED:false}
    region: ${AWS_REGION:af-south-1}
    from-email: ${AWS_SES_FROM_EMAIL:noreply@edusync.co.za}

azure:
  ad:
    tenant-id: ${AZURE_TENANT_ID:}
    client-id: ${AZURE_CLIENT_ID:}
    client-secret: ${AZURE_CLIENT_SECRET:}
    organizer-user-id: ${AZURE_ORGANIZER_USER_ID:}

springdoc:
  swagger-ui:
    path: /docs
